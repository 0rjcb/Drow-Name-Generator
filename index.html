    // --- HELPER FUNCTIONS ---

    function getRandomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function findInTable(table, rollValue) {
        return table.find(item => item.roll === rollValue);
    }

    function getPrefixForm(prefixObj, gender) {
        if (gender === 'male' && prefixObj.masculine) {
            return prefixObj.masculine;
        }
        return prefixObj.feminine || prefixObj.text || prefixObj.prefix || prefixObj;
    }

    function getSuffixForm(suffixObj, gender) {
        if (gender === 'male' && suffixObj.masculine) {
            return { text: suffixObj.masculine, meaning: suffixObj.meaning };
        }
        return { text: suffixObj.feminine || suffixObj.text || suffixObj.suffix, meaning: suffixObj.meaning };
    }

    // Generate a single name using a chosen ruleset
    function generateSingleName(rulesetKey, gender) {
        const isUnderdark = rulesetKey === 'underdark';
        
        if (isUnderdark) {
            // Underdark ruleset logic
            const ruleRoll = getRandomInt(1, 100);
            let prefixRolls = [];
            let suffixRolls = [];
            let secondName = null;
            let useApostrophe = false;

            // Determine structure based on rule roll (simplified for common cases)
            if (ruleRoll <= 30) {
                // Standard: 1 prefix, 1 suffix
                prefixRolls.push(findInTable(underdarkPrefixes, getRandomInt(1, 100)));
                suffixRolls.push(findInTable(underdarkSuffixes, getRandomInt(1, 100)));
            } else if (ruleRoll <= 70) {
                // 1 prefix, 2 suffixes
                prefixRolls.push(findInTable(underdarkPrefixes, getRandomInt(1, 100)));
                suffixRolls.push(findInTable(underdarkSuffixes, getRandomInt(1, 100)));
                suffixRolls.push(findInTable(underdarkSuffixes, getRandomInt(1, 100)));
            } else if (ruleRoll <= 90) {
                // Two names
                const p1 = findInTable(underdarkPrefixes, getRandomInt(1, 100));
                const s1 = findInTable(underdarkSuffixes, getRandomInt(1, 100));
                const s1Form = getSuffixForm(s1, gender);
                const p2 = findInTable(underdarkPrefixes, getRandomInt(1, 100));
                const s2 = findInTable(underdarkSuffixes, getRandomInt(1, 100));
                const s2Form = getSuffixForm(s2, gender);
                secondName = {
                    name: p1.text + s1Form.text,
                    breakdown: [`Prefix: ${p1.text}`, `Suffix: ${s1Form.text}`, `Prefix: ${p2.text}`, `Suffix: ${s2Form.text}`]
                };
            } else if (ruleRoll <= 100) {
                // Special: suffix + apostrophe + prefix + suffix
                useApostrophe = true;
                const s = findInTable(underdarkSuffixes, getRandomInt(1, 100));
                const sForm = getSuffixForm(s, gender);
                const p = findInTable(underdarkPrefixes, getRandomInt(1, 100));
                const s2 = findInTable(underdarkSuffixes, getRandomInt(1, 100));
                const s2Form = getSuffixForm(s2, gender);
                
                return {
                    name: `${sForm.text}' ${p.text}${s2Form.text}`,
                    breakdown: [`Suffix (initial): ${sForm.text}`, `Prefix: ${p.text}`, `Suffix: ${s2Form.text}`],
                    meaning: `${sForm.meaning}, ${s2Form.meaning}`,
                    ruleset: 'Drow of the Underdark (3.5e)',
                    useApostrophe: true
                };
            }

            // Build the name from prefix/suffix rolls
            let nameParts = [];
            let breakdown = [];
            let meanings = [];

            prefixRolls.forEach((p, i) => {
                nameParts.push(p.text);
                breakdown.push(`Prefix ${i+1}: ${p.text}`);
                meanings.push(p.meaning);
            });

            suffixRolls.forEach((s, i) => {
                const sForm = getSuffixForm(s, gender);
                nameParts.push(sForm.text);
                breakdown.push(`Suffix ${i+1}: ${sForm.text}`);
                meanings.push(sForm.meaning);
            });

            return {
                name: nameParts.join(""),
                breakdown: breakdown,
                meaning: meanings.join(", "),
                ruleset: 'Drow of the Underdark (3.5e)',
                secondName: secondName
            };

        } else {
            // Dragon Magazine #267 ruleset logic
            const ruleRoll = getRandomInt(1, 10);
            let prefixRolls = [];
            let suffixRolls = [];
            let secondName = null;
            let useApostrophe = false;

            // Table 1 rules
            if (ruleRoll <= 3) {
                // Roll once on Table 2 and once on Table 3
                prefixRolls.push(findInTable(dragonPrefixes, getRandomInt(1, 100)));
                suffixRolls.push(findInTable(dragonSuffixes, getRandomInt(1, 100)));
            } else if (ruleRoll <= 5) {
                // Roll once on Table 2 and twice on Table 3
                prefixRolls.push(findInTable(dragonPrefixes, getRandomInt(1, 100)));
                suffixRolls.push(findInTable(dragonSuffixes, getRandomInt(1, 100)));
                suffixRolls.push(findInTable(dragonSuffixes, getRandomInt(1, 100)));
            } else if (ruleRoll <= 7) {
                // Roll once on Table 2, once on Table 3, add apostrophe, roll again on Table 3
                useApostrophe = true;
                const p = findInTable(dragonPrefixes, getRandomInt(1, 100));
                const s1 = findInTable(dragonSuffixes, getRandomInt(1, 100));
                const s1Form = getSuffixForm(s1, gender);
                const s2 = findInTable(dragonSuffixes, getRandomInt(1, 100));
                const s2Form = getSuffixForm(s2, gender);
                
                return {
                    name: `${p.text}${s1Form.text}'${s2Form.text}`,
                    breakdown: [`Prefix: ${p.text}`, `Suffix (before apostrophe): ${s1Form.text}`, `Suffix (after apostrophe): ${s2Form.text}`],
                    meaning: `${p.meaning}, ${s1Form.meaning}, ${s2Form.meaning}`,
                    ruleset: 'Dragon Magazine #267 (2e)',
                    useApostrophe: true
                };
            } else if (ruleRoll <= 9) {
                // Two names (roll Table 1 again for second name - simplified as single generation)
                const p1 = findInTable(dragonPrefixes, getRandomInt(1, 100));
                const s1 = findInTable(dragonSuffixes, getRandomInt(1, 100));
                const s1Form = getSuffixForm(s1, gender);
                const p2 = findInTable(dragonPrefixes, getRandomInt(1, 100));
                const s2 = findInTable(dragonSuffixes, getRandomInt(1, 100));
                const s2Form = getSuffixForm(s2, gender);
                
                return {
                    name: `${p1.text}${s1Form.text}`,
                    breakdown: [`Prefix: ${p1.text}`, `Suffix: ${s1Form.text}`, `Prefix (2nd): ${p2.text}`, `Suffix (2nd): ${s2Form.text}`],
                    meaning: `${p1.meaning}, ${s1Form.meaning}, ${p2.meaning}, ${s2Form.meaning}`,
                    ruleset: 'Dragon Magazine #267 (2e)',
                    useApostrophe: false,
                    secondName: `${p2.text}${s2Form.text}`
                };
            } else {
                // Roll 10: Roll once on Table 3, add apostrophe, roll Table 2, roll Table 3
                useApostrophe = true;
                const s1 = findInTable(dragonSuffixes, getRandomInt(1, 100));
                const s1Form = getSuffixForm(s1, gender);
                const p = findInTable(dragonPrefixes, getRandomInt(1, 100));
                const s2 = findInTable(dragonSuffixes, getRandomInt(1, 100));
                const s2Form = getSuffixForm(s2, gender);
                
                return {
                    name: `${s1Form.text}'${p.text}${s2Form.text}`,
                    breakdown: [`Suffix (initial): ${s1Form.text}`, `Prefix: ${p.text}`, `Suffix: ${s2Form.text}`],
                    meaning: `${s1Form.meaning}, ${p.meaning}, ${s2Form.meaning}`,
                    ruleset: 'Dragon Magazine #267 (2e)',
                    useApostrophe: true
                };
            }

            // Build name from rolls
            let nameParts = [];
            let breakdown = [];
            let meanings = [];

            prefixRolls.forEach((p, i) => {
                const pForm = getPrefixForm(p, gender);
                nameParts.push(pForm);
                breakdown.push(`Prefix ${i+1}: ${pForm}`);
                meanings.push(p.meaning);
            });

            suffixRolls.forEach((s, i) => {
                const sForm = getSuffixForm(s, gender);
                nameParts.push(sForm.text);
                breakdown.push(`Suffix ${i+1}: ${sForm.text}`);
                meanings.push(sForm.meaning);
            });

            return {
                name: nameParts.join(""),
                breakdown: breakdown,
                meaning: meanings.join(", "),
                ruleset: 'Dragon Magazine #267 (2e)',
                useApostrophe: useApostrophe,
                secondName: secondName
            };
        }
    }

    // --- MAIN LOGIC ---

    function generateNames() {
        const gender = document.getElementById('genderSelect').value;
        const resultsDiv = document.getElementById('results');
        resultsDiv.innerHTML = '';

        for (let i = 0; i < 5; i++) {
            // Randomly choose ruleset (50/50)
            const rulesetKey = Math.random() < 0.5 ? 'underdark' : 'dragon';
            const data = generateSingleName(rulesetKey, gender);
            
            const card = document.createElement('div');
            card.className = 'name-card';
            
            let breakdownHtml = data.breakdown.map(item => `
                <li>${item}</li>
            `).join('');

            let secondNameHtml = data.secondName ? `
                <div style="margin-top: 10px; border-top: 1px solid #ddd; padding-top: 5px;">
                    <strong>Surname:</strong> ${data.secondName}
                </div>
            ` : '';

            card.innerHTML = `
                <div class="ruleset-indicator">Ruleset: ${data.ruleset}</div>
                <h3>Name ${i + 1}</h3>
                <span class="name">${data.name}</span>
                <div class="breakdown">
                    <strong>Dice Roll Breakdown:</strong>
                    <ul>
                        ${breakdownHtml}
                    </ul>
                </div>
                <div class="meaning">Meaning: ${data.meaning || "Not available"}</div>
                ${secondNameHtml}
            `;
            
            resultsDiv.appendChild(card);
        }
    }

    // Initialize - wire up button
    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('generateBtn').addEventListener('click', generateNames);
        generateNames(); // Generate one set on load
    });
